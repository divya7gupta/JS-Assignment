<!DOCTYPE html>
<html>
<body>
<script>

let N = Number(prompt("Enter N:"));
let K = Number(prompt("Enter K:"));

let answer = -1;

for (let X = 0; X <= 100000; X++) {

    let num = N + X;

    if (num % K == 0) {

        let temp = num;
        let rev = 0;

        while (temp > 0) {
            rev = rev * 10 + (temp % 10);
            temp = Math.floor(temp / 10);
        }

        if (rev == num) {
            answer = X;
            break;
        }
    }
}

alert(answer);

</script>
</body>
</html>
